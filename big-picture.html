<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big Picture — HomeSkewl</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .unit-grid { display:grid; gap:10px; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); margin-bottom:8px; }
    .unit-card { padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); }
    .unit-name { font-size:0.875rem; font-weight:600; margin-bottom:4px; }
    .unit-progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:4px; }
    .unit-progress-fill { height:100%; border-radius:3px; background: var(--success); transition:width 0.5s ease; }
    .unit-count { font-size:0.75rem; color:var(--text-dim); }
    .subject-section { margin-bottom:24px; }
    .subject-section-title { font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
    .completion-row { padding:10px 0; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:3px; }
    .completion-row:last-child { border-bottom:none; }
    .completion-item { font-size:0.875rem; font-weight:500; }
    .completion-notes { font-size:0.8rem; color:var(--text-muted); font-style:italic; }
    .completion-date { font-size:0.75rem; color:var(--text-dim); }
    .empty-msg { color:var(--text-dim); font-size:0.875rem; font-style:italic; padding:8px 0; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <span class="nav-brand"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2E5077" stroke-width="2.5" style="flex-shrink: 0;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>HomeSkewl</span>
    <a href="index.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Today</span>
    </a>
    <a href="rabbit-hole.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Rabbit Hole</span>
    </a>
    <a href="big-picture.html" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Big Picture</span>
    </a>
    <a href="learning-review.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>Review</span>
    </a>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <h1>The Big Picture</h1>
    <div class="date">Progress overview — all units, all standards</div>
  </div>

  <!-- Stats row -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-number" id="stat-done" style="color:var(--success)">–</div><div class="stat-label">Done This Week</div></div>
    <div class="stat-card"><div class="stat-number" id="stat-pending" style="color:var(--accent)">–</div><div class="stat-label">In Progress</div></div>
    <div class="stat-card"><div class="stat-number" id="stat-stuck" style="color:#EF4444">–</div><div class="stat-label">Stuck (3+ days)</div></div>
    <div class="stat-card"><div class="stat-number" id="stat-standards" style="color:var(--text-muted)">–</div><div class="stat-label">Standards Done</div></div>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Loading…</div>
  </div>
</main>

<script src="config.js"></script>
<script src="big-picture.js"></script>
</body>
</html>
