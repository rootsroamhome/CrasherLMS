    .back-btn:hover { color:var(--text); }
    .content-title { font-size:1.4rem; font-weight:700; margin-bottom:4px; }
    .content-meta { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:24px; }
    .content-section { margin-bottom:28px; }
    .content-section-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }

    .check-option { padding:12px; background:var(--bg-secondary); border-left:3px solid var(--accent); margin-bottom:12px; }
    .check-option-title { font-weight:600; margin-bottom:6px; font-size:0.95rem; }
    .check-option-desc { font-size:0.85rem; color:var(--text-dim); line-height:1.4; }
  </style>
</head>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const recordId = params.get('recordId');
  const TODAY = new Date().toISOString().split('T')[0];

  const lessonData = {
    'Sexual and asexual reproduction': {
      title: 'Sexual and Asexual Reproduction',
      hook: 'Did you know? Some animals never need a partner to have babies. Starfish can clone themselves. But humans need two parents. Why the difference? And which strategy is better? Let\'s find out.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">{{hook}}</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can explain the difference between sexual and asexual reproduction and describe why organisms use each strategy.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Sexual vs Asexual Reproduction</span>
              <span class="choice-meta">~10 min — see the difference and why it matters</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:sexual-and-asexual-reproduction" target="_blank" rel="noopener">Watch on Khan Academy ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">Amoebas, Coral, and People — Different Ways to Make Babies</span>
              <span class="choice-meta">~8 min read with real examples</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:sexual-and-asexual-reproduction" target="_blank" rel="noopener">Read on Khan Academy ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Explore</span>
              <span class="choice-desc">Nature Documentary Clips — Watch real animals reproducing</span>
              <span class="choice-meta">~5 min — see it in action in nature</span>
              <a class="choice-link" href="https://www.youtube.com/results?search_query=animal+reproduction+nature+documentary" target="_blank" rel="noopener">Search on YouTube ↗</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences explaining: What is the main difference between sexual and asexual reproduction? Why would an organism pick one over the other?',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. A starfish reproduces by breaking apart and growing new starfish from each piece. Is this sexual or asexual reproduction? How do you know?',
            '2. Humans need two parents to make a baby. Why do you think that strategy evolved for us?'
          ],
          id: 'check-questions'
        },
        {
          type: 'Creative: Teach Someone Young',
          prompt: 'Imagine you\'re explaining this to a 5-year-old who wants to know why some animals need a mom and dad, but some animals can make babies all by themselves. What would you tell them? Write it out or practice saying it out loud.',
          id: 'check-creative'
        }
      ]
    },
    'Animal behavior and offspring success': {
      title: 'Animal Behavior and Offspring Success',
      hook: 'A male peacock grows an enormous, ridiculous tail that makes it harder to run away from predators. Why would he do that? Because peahens think it\'s attractive. Behavior — even seemingly pointless behavior — can be the difference between passing on genes or not.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">{{hook}}</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can explain how animal behaviors increase the chances of successful reproduction.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Animal Behavior & Reproduction</span>
              <span class="choice-meta">~12 min — courtship, displays, mating behavior</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:animal-behavior-and-offspring-success" target="_blank" rel="noopener">Watch on Khan Academy ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">Why Animals Perform for Each Other</span>
              <span class="choice-meta">~10 min — mating displays explained</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:animal-behavior-and-offspring-success" target="_blank" rel="noopener">Read on Khan Academy ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Nature Clips — Real Mating Displays in Action</span>
              <span class="choice-meta">~5 min — birds of paradise, dancing, singing</span>
              <a class="choice-link" href="https://www.youtube.com/results?search_query=birds+of+paradise+mating+display" target="_blank" rel="noopener">Search on YouTube ↗</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences: Why do you think animals perform behaviors like dancing, singing, or showing off their appearance? How does that help them have babies?',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. A male bird builds an elaborate nest and sings complex songs to attract females. Is this behavior helping him reproduce? How?',
            '2. Can you think of a human behavior that might be related to finding a partner and having kids?'
          ],
          id: 'check-questions'
        },
        {
          type: 'Creative: Draw & Label',
          prompt: 'Draw an animal (real or imaginary) with 3-5 behaviors or features that help it attract a mate. Label each one and write a sentence explaining why that behavior/feature would help it reproduce.',
          id: 'check-creative'
        }
      ]
    },
    'Plant reproductive success': {
      title: 'Plant Reproductive Success',
      hook: 'Plants can\'t walk around looking for dates. So they got creative. Some plants make bright flowers to attract bees. Some release millions of pollen grains into the wind hoping one lands on another plant. Some grow berries so animals eat them and spread their seeds. Plants are wild.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">{{hook}}</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can explain how plant structures (flowers, pollen, seeds, fruit) help plants reproduce successfully.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Plant Reproduction & Structures</span>
              <span class="choice-meta">~12 min — flowers, pollination, seed dispersal</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:plant-reproductive-success" target="_blank" rel="noopener">Watch on Khan Academy ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">How Plants Make Babies Without Moving</span>
              <span class="choice-meta">~10 min — pollination strategies and seed travel</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:plant-reproductive-success" target="_blank" rel="noopener">Read on Khan Academy ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Explore</span>
              <span class="choice-desc">Look at Real Flowers & Seed Pods Around You</span>
              <span class="choice-meta">~10 min — pick apart a flower, look at seeds</span>
              <a class="choice-link" href="#">Learn below ↓</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences explaining: What are the main parts of a flower and what does each one do for reproduction? Why do berries and bright colors help plants make babies?',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. A flower is bright red and smells sweet. How does that help the plant reproduce? What animal might help?',
            '2. Some seeds float on wind, some travel in animal fur, some float on water. Why do plants need to spread their seeds far away from the parent plant?'
          ],
          id: 'check-questions'
        },
        {
          type: 'Creative: Collect & Analyze',
          prompt: 'Find 3 different seeds or seed pods (or berries) around your house/yard. Look at each one and write: How do you think this seed spreads? (Does it float? Does it stick to fur? Does an animal eat it?) What structure helps it spread?',
          id: 'check-creative'
        }
      ]
    },
    'Organism growth and the environment': {
      title: 'Organism Growth and the Environment',
      hook: 'Why do plants grow taller if you move them to a sunny spot? Why do tadpoles grow bigger if there\'s more food in the pond? Your genes say what you CAN be, but your environment says what you WILL be. The same genes in two different environments make very different organisms.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">{{hook}}</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can explain how environmental and genetic factors influence organism growth.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Growth & the Environment</span>
              <span class="choice-meta">~12 min — how sunlight, water, nutrients affect growth</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:organism-growth-and-the-environment" target="_blank" rel="noopener">Watch on Khan Academy ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">Genes vs Environment: What Really Matters for Growth?</span>
              <span class="choice-meta">~10 min — nature vs nurture explained</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:organism-growth-and-the-environment" target="_blank" rel="noopener">Read on Khan Academy ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Observe</span>
              <span class="choice-desc">Simple Growth Experiment with Plants or Data</span>
              <span class="choice-meta">~10 min — think about how variables affect growth</span>
              <a class="choice-link" href="#">Learn below ↓</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences explaining: Give an example of how the same genes can lead to different sizes or appearances in two different environments. Why does this matter?',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. Two tomato plants have identical genes, but one gets lots of sunlight and water, the other gets none. Why would they grow differently?',
            '2. Can an environment change make someone\'s genes change? (Yes or no — explain your answer.)'
          ],
          id: 'check-questions'
        },
        {
          type: 'Creative: Design an Experiment',
          prompt: 'Design (don\'t actually do it unless you want to) an experiment to test how ONE environmental factor (sunlight, water, temperature) affects how fast a plant grows. What would you measure? How would you keep other things the same? Draw a simple diagram showing your setup.',
          id: 'check-creative'
        }
      ]
    }
  };

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  async function loadLesson() {
    if (!recordId) {
      document.getElementById('content-main').innerHTML = '<p>No lesson found. <a href="index.html">Go back</a></p>';
      return;
    }

    try {
      const res = await fetch(`${CONFIG.apiBase}/${encodeURIComponent(TABLES.todos)}/${recordId}`);
      if (!res.ok) throw new Error('Record not found');
      const record = await res.json();
      const itemName = record.fields['Item name'] || '';

      // Find matching lesson
      let lesson = null;
      for (const [key, data] of Object.entries(lessonData)) {
        if (itemName.includes(key)) {
          lesson = data;
          break;
        }
      }

      if (!lesson) {
        // This might be the Khan test day
        if (itemName.includes('Unit test')) {
          renderKhanTest();
          return;
        }
        document.getElementById('content-main').innerHTML = '<p>Lesson not found.</p>';
        return;
      }

      // Render lesson
      document.getElementById('lesson-title').textContent = lesson.title;
      document.getElementById('lesson-content').innerHTML = lesson.content.replace(/\{\{hook\}\}/g, lesson.hook);

      // Render checks
      const checksHtml = lesson.checks.map((check, idx) => `
        <div class="check-option">
          <div class="check-option-title">Option ${idx + 1}: ${check.type}</div>
          <div class="check-option-desc">
            ${check.questions ? check.questions.map(q => `<p style="margin-bottom:6px;">${q}</p>`).join('') : check.prompt}
          </div>
        </div>
      `).join('');

      document.getElementById('check-options').innerHTML = checksHtml;

      // Render done form
      if (recordId) {
        document.getElementById('done-area').innerHTML = `
          <textarea id="notes-content" class="rh-input" placeholder="Share your answer from the check above..." style="min-height:120px; margin-bottom:12px;"></textarea>
          <button class="btn btn-success" onclick="markDone()">✓ Mark This Done</button>
        `;
      }

    } catch (e) {
      console.error(e);
      document.getElementById('content-main').innerHTML = '<p>Error loading lesson.</p>';
    }
  }

  function renderKhanTest() {
    document.getElementById('lesson-content').innerHTML = `
      <div class="content-section">
        <div class="content-section-header">
          <span class="content-section-icon">🎯</span>
          <span class="content-section-title">Khan Academy Unit Test</span>
        </div>
        <p style="margin-bottom:16px; font-size:0.95rem;">You've finished all the lessons for this unit. Now it's time to show what you know on the Khan Academy unit test.</p>
        <p style="margin-bottom:16px; font-size:0.9rem; color:var(--text-dim);">The test has 10 questions. Take your time and do your best. You can take it more than once if you want to improve your score.</p>
        <a href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:organism-growth-and-reproduction/x0c5bb03129646fd6:organism-growth-and-the-environment/test/x0c5bb03129646fd6:organism-growth-and-reproduction-unit-test" target="_blank" class="btn btn-success" style="display:inline-block; margin-bottom:20px;">
          Go to Khan Academy Unit Test ↗
        </a>
      </div>
    `;

    document.getElementById('check-section').style.display = 'none';

    document.getElementById('done-area').innerHTML = `
      <textarea id="notes-content" class="rh-input" placeholder="Once you've completed the Khan Academy unit test, let us know how it went (optional notes here)" style="min-height:80px; margin-bottom:12px;"></textarea>
      <button class="btn btn-success" onclick="markDone()">✓ Mark Unit Test Complete</button>
    `;
  }

  window.markDone = async function () {
    const notes = document.getElementById('notes-content')?.value.trim() || '';
    try {
      const res = await fetch(`${CONFIG.apiBase}/${encodeURIComponent(TABLES.todos)}/${recordId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields: { Status: 'Done', 'Completion date': TODAY, 'Student notes': notes } }),
      });
      if (!res.ok) throw new Error('Save failed');
      showToast('Done! Great work. ✓');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (e) {
      console.error(e);
      showToast('Error saving — try from the main list.');
    }
  };

  loadLesson();
</script>
</body>
</html>
