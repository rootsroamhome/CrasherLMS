<script>

  const lessonData = {
    'Evolution and common ancestry': {
      title: 'Evolution and Common Ancestry',
      hook: 'Humans, chimpanzees, and bananas all share the same basic cellular machinery. We all use DNA. We all use the same genetic code. We all have mitochondria. Why? Because we\'re all descended from a common ancestor. Life on Earth is connected.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">Humans, chimpanzees, and bananas all share the same basic cellular machinery. We all use DNA. We all use the same genetic code. We all have mitochondria. Why? Because we're all descended from a common ancestor. Life on Earth is connected.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can explain evolution by natural selection and describe evidence for common ancestry among living organisms.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Evolution and Natural Selection</span>
              <span class="choice-meta">~13 min — how species change over time</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Watch ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>

    'The fossil record': {

          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">Fossils are like a time machine. Paleontologists dig up rocks with ancient organisms inside. By looking at layers, they can see how life changed over millions of years. From simple to complex. From fish to amphibians to reptiles to mammals.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can analyze the fossil record to show evidence of evolution and explain how fossils form.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — The Fossil Record</span>

            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">How Fossils Tell the Story of Evolution</span>
              <span class="choice-meta">~10 min — fossil formation, dating methods</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Read ↗</a>

            <li class="choice-item">
              <span class="choice-type">Explore</span>
              <span class="choice-desc">Interactive Fossil Timeline: Horse Evolution</span>

              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Explore ↗</a>

        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences: What is a fossil? How do fossils show evidence of evolution? Give one example of a fossil record that shows change over time.',

        {
          type: 'Questions',
          questions: [
            '1. How do paleontologists know which fossils are older? What methods do they use?',

          id: 'check-questions'

          type: 'Creative: Build a Timeline',

        }
      ]

    'Evidence of evolution: anatomy': {
      title: 'Evidence of Evolution: Anatomy',

          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">A human arm, a whale flipper, a bat wing, and a dog paw all have the same bones in the same order. Why? Because they're modified versions of the same ancestral limb. This is called homologous structures. It's evidence of common ancestry.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can use comparative anatomy (homologous and vestigial structures) as evidence for evolution.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>

            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">Same Bones, Different Jobs: How Evolution Repurposes</span>

              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Read ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Explore</span>
              <span class="choice-desc">Interactive: Compare Limb Structures</span>
              <span class="choice-meta">~10 min — see the similarities in different animals</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Explore ↗</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences: What are homologous structures? Give an example (human arm, whale flipper, bat wing, etc.). What do they tell us about evolution?',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. A whale is a mammal that lives in water. How is a whale flipper similar to a human arm? Why are they similar?',
            '2. Humans have tailbones. Apes have tails. What does this tell you about our evolutionary history?'

          type: 'Creative: Bone Sketch',
          prompt: 'Draw 4 limbs side-by-side: human arm, whale flipper, bat wing, dog leg. Highlight which bones are the same across all four. Explain: Why do different animals have the same bones if they use them for different purposes?',
          id: 'check-creative'

    },
    'Activity: How can we use skeletons and fossils to understand whale evolution?': {
      title: 'Activity: Whale Evolution Through Skeletons',

      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">Whales are mammals with lungs and bones. But modern whales have no hind limbs, just a spine with vestigial pelvic bones. Fossils show the transition: ancient whales had four legs. Over time, hind limbs shrunk. This is evolution in action.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can analyze fossil and anatomical evidence to trace evolutionary change in a lineage (whales as an example).</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy Activity — Evolution of Whales</span>
              <span class="choice-meta">~12 min — fossil evidence, transitional forms</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Watch ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">From Land to Sea: The Whale\'s Journey Through Deep Time</span>
              <span class="choice-meta">~10 min — detailed whale evolution story</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Read ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Do It</span>
              <span class="choice-desc">Analyze Whale Fossils and Skeletons</span>
              <span class="choice-meta">~15 min — compare ancient and modern whales</span>
              <a class="choice-link" href="#">Do below ↓</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 3-4 sentences: Describe the evolution of whales from land mammals to ocean animals. What fossil and anatomical evidence shows this transition?',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. Modern whales have vestigial pelvic bones (leftover hip bones from ancient whales). Why would they keep bones they don\'t use?',
            '2. What would the fossil record of a whale\'s ancestor look like? What would it show?'

          id: 'check-questions'
        },
        {
          type: 'Creative: Evolutionary Timeline',
          prompt: 'Create a 5-stage timeline showing whale evolution from land to sea. At each stage, draw or describe: body shape, limbs, habitats. Label what changed from the previous stage. Include dates (millions of years ago).',
          id: 'check-creative'
        }
      ]
    },
    'Evidence of evolution: embryology': {
      title: 'Evidence of Evolution: Embryology',
      hook: 'Chicken embryos, pig embryos, and human embryos all look almost identical in early stages. All have gill slits (humans don\'t use them). All have tails (we reabsorb them). This shows we share a common ancestor. Our development still echoes our evolutionary past.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">Chicken embryos, pig embryos, and human embryos all look almost identical in early stages. All have gill slits (humans don't use them). All have tails (we reabsorb them). This shows we share a common ancestor. Our development still echoes our evolutionary past.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can use embryological similarities as evidence for evolution and common ancestry.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>

          <ul class="choice-list">

              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Embryology and Evolution</span>
              <span class="choice-meta">~12 min — comparing early development</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Watch ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">Writing in Our Genes: What Embryos Reveal About Evolution</span>
              <span class="choice-meta">~10 min — embryonic evidence</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Read ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Explore</span>
              <span class="choice-desc">Interactive: Compare Embryos Side-by-Side</span>
              <span class="choice-meta">~10 min — see similarities in development</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution" target="_blank" rel="noopener">Explore ↗</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences: What are embryological similarities? Give two examples of structures that human embryos develop but don\'t keep as adults. What does this tell us about evolution?',

          questions: [

        {
          type: 'Creative: Compare Embryos',
          prompt: 'Draw early embryos of 4 different animals (human, fish, bird, mammal) side-by-side. Label which parts look similar. Then draw what each looks like as an adult. Write: Why do they start similar but end up different?',

        }
      ]

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  async function loadLesson() {
    if (!recordId) {
      document.getElementById('content-main').innerHTML = '<p>No lesson found. <a href="index.html">Go back</a></p>';
      return;
    }

    try {
      const res = await fetch(`${CONFIG.apiBase}/${encodeURIComponent(TABLES.todos)}/${recordId}`);
      if (!res.ok) throw new Error('Record not found');
      const record = await res.json();
      const itemName = record.fields['Item name'] || '';

      let lesson = null;
      for (const [key, data] of Object.entries(lessonData)) {
        if (itemName.includes(key)) {
          lesson = data;
          break;
        }
      }

      if (!lesson) {
        if (itemName.includes('Unit test')) {
          renderKhanTest();
          return;
        }
        document.getElementById('content-main').innerHTML = '<p>Lesson not found.</p>';
        return;
      }

      document.getElementById('lesson-title').textContent = lesson.title;
      document.getElementById('lesson-content').innerHTML = lesson.content;

      const checksHtml = lesson.checks.map((check, idx) => `
        <div class="check-option">
          <div class="check-option-title">Option ${idx + 1}: ${check.type}</div>
          <div class="check-option-desc">
            ${check.questions ? check.questions.map(q => `<p style="margin-bottom:6px;">${q}</p>`).join('') : check.prompt}
          </div>
        </div>
      `).join('');

      document.getElementById('check-options').innerHTML = checksHtml;

      if (recordId) {
        document.getElementById('done-area').innerHTML = `
          <textarea id="notes-content" class="rh-input" placeholder="Share your answer from the check above..." style="min-height:120px; margin-bottom:12px;"></textarea>
          <button class="btn btn-success" onclick="markDone()">✓ Mark This Done</button>
        `;
      }

    } catch (e) {
      console.error(e);
      document.getElementById('content-main').innerHTML = '<p>Error loading lesson.</p>';
    }
  }

  function renderKhanTest() {
    document.getElementById('lesson-content').innerHTML = `
      <div class="content-section">
        <div class="content-section-header">
          <span class="content-section-icon">🎯</span>
          <span class="content-section-title">Khan Academy Unit Test</span>
        </div>
        <p style="margin-bottom:16px; font-size:0.95rem;">You've finished all the lessons for this unit. Now it's time to show what you know on the Khan Academy unit test.</p>
        <p style="margin-bottom:16px; font-size:0.9rem; color:var(--text-dim);">The test has 10 questions. Take your time and do your best. You can take it more than once if you want to improve your score.</p>
        <a href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:evolution/test/x0c5bb03129646fd6:evolution-unit-test" target="_blank" class="btn btn-success" style="display:inline-block; margin-bottom:20px;">
          Go to Khan Academy Unit Test ↗
        </a>
      </div>
    `;

    document.getElementById('check-section').style.display = 'none';

    document.getElementById('done-area').innerHTML = `
      <textarea id="notes-content" class="rh-input" placeholder="Once you've completed the Khan Academy unit test, let us know how it went (optional notes here)" style="min-height:80px; margin-bottom:12px;"></textarea>
      <button class="btn btn-success" onclick="markDone()">✓ Mark Unit Test Complete</button>
    `;
  }

  window.markDone = async function () {
    const notes = document.getElementById('notes-content')?.value.trim() || '';
    try {
      const res = await fetch(`${CONFIG.apiBase}/${encodeURIComponent(TABLES.todos)}/${recordId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields: { Status: 'Done', 'Completion date': TODAY, 'Student notes': notes } }),
      });
      if (!res.ok) throw new Error('Save failed');
      showToast('Done! Great work. ✓');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (e) {
      console.error(e);
      showToast('Error saving — try from the main list.');
    }
  };

  loadLesson();
</script>
</body>
</html>
