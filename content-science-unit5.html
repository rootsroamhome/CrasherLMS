<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecosystems & Biodiversity — CrasherLMS</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .back-btn { display:inline-flex; align-items:center; gap:6px; color:var(--text-muted); font-size:0.85rem; font-weight:500; margin-bottom:20px; transition:color .15s; }
    .back-btn:hover { color:var(--text); }
    .content-title { font-size:1.4rem; font-weight:700; margin-bottom:4px; }
    .content-meta { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:24px; }
    .content-section { margin-bottom:28px; }
    .content-section-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .content-section-icon { font-size:1.2rem; }
    .content-section-title { font-size:1rem; font-weight:600; }
    .choice-list { list-style:none; padding:0; }
    .choice-item { padding:14px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:12px; }
    .choice-type { display:inline-block; font-size:0.75rem; font-weight:600; text-transform:uppercase; color:var(--accent); margin-bottom:4px; }
    .choice-desc { display:block; font-size:0.95rem; font-weight:500; margin-bottom:6px; }
    .choice-meta { display:block; font-size:0.8rem; color:var(--text-dim); margin-bottom:8px; }
    .choice-link { display:inline-block; font-size:0.85rem; color:var(--accent); text-decoration:none; }
    .choice-link:hover { text-decoration:underline; }
    .check-section { margin-top:20px; padding:16px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); }
    .check-option { padding:12px; background:var(--bg-secondary); border-left:3px solid var(--accent); margin-bottom:12px; }
    .check-option-title { font-weight:600; margin-bottom:6px; font-size:0.95rem; }
    .check-option-desc { font-size:0.85rem; color:var(--text-dim); line-height:1.4; }
  </style>
</head>
<body>

<main class="page" id="content-main">
  <a href="index.html" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>

  <div class="content-meta">
    <span class="subject-badge" style="background:#14391f; color:#86EFAC;">Science</span>
    <span style="font-size:0.75rem; color:var(--text-dim);">MS-LS4-1, MS-LS4-5</span>
    <span style="font-size:0.75rem; color:var(--text-dim);">Unit 5 — Ecosystems & Biodiversity</span>

  <div class="content-title" id="lesson-title">Ecosystems & Biodiversity</div>

  <div id="lesson-content"></div>

  <div class="content-section" id="check-section">
    <div class="content-section-header">
      <span class="content-section-icon">✓</span>
      <span class="content-section-title">Show What You Know — Pick One</span>

      <span class="content-section-icon">✓</span>
      <span class="content-section-title">Mark This Done</span>
    </div>
    <p style="margin-bottom:12px; font-size:0.875rem; color:var(--text-muted);">Once you've completed your chosen check above, submit it here.</p>
    <div id="done-area"></div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const recordId = params.get('recordId');
  const TODAY = new Date().toISOString().split('T')[0];

  const lessonData = {
    'Ecosystem dynamics': {
      title: 'Ecosystem Dynamics',
      hook: 'Ecosystems are alive. They change. Forests grow. Forests burn and regrow. Species move in. Species go extinct. Nothing stays the same forever. Understanding how ecosystems change over time helps us protect them.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">Ecosystems are alive. They change. Forests grow. Forests burn and regrow. Species move in. Species go extinct. Nothing stays the same forever. Understanding how ecosystems change over time helps us protect them.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can explain ecological succession and describe how ecosystems change over time.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Ecological Succession</span>
              <span class="choice-meta">~12 min — primary and secondary succession</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Watch ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">How Nature Recovers: From Bare Rock to Forest</span>
              <span class="choice-meta">~10 min — succession stages explained</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Read ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Observe</span>
              <span class="choice-desc">Look for Succession in Your Area</span>
              <span class="choice-meta">~10 min — find evidence of ecosystem change</span>
              <a class="choice-link" href="#">Explore below ↓</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences: What is ecological succession? Give an example of how a bare area (like a burned forest or abandoned parking lot) could be taken over by plants and animals over time.',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. What is the difference between primary and secondary succession? Which one is faster? Why?',
            '2. After a forest fire, grasses grow first, then shrubs, then trees. Why does the order matter?'
          ],
          id: 'check-questions'
        },
        {
          type: 'Creative: Time-Lapse Diagram',
          prompt: 'Draw or create a 4-5 panel time-lapse of succession. Panel 1: bare rock or burned area. Panel 2-4: show how plants and animals gradually colonize it. Panel 5: mature ecosystem. Label what lives at each stage.',
          id: 'check-creative'
        }
      ]
    },
    'Biodiversity and ecosystem health': {
      title: 'Biodiversity and Ecosystem Health',
      hook: 'A rainforest with 1,000 species is healthier than a field with just grass. More diversity means more stability. If one species fails, others take its place. But if you lose biodiversity, the whole system becomes fragile.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">A rainforest with 1,000 species is healthier than a field with just grass. More diversity means more stability. If one species fails, others take its place. But if you lose biodiversity, the whole system becomes fragile.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can explain why biodiversity is important for ecosystem health and resilience.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Biodiversity and Ecosystem Stability</span>
              <span class="choice-meta">~12 min — why more species = healthier ecosystem</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Watch ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">Why Every Species Matters: Redundancy and Stability</span>
              <span class="choice-meta">~10 min — functional redundancy explained</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Read ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Explore</span>
              <span class="choice-desc">Compare Biodiversity: Rainforest vs. Monoculture</span>
              <span class="choice-meta">~10 min — see the difference in species richness</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Explore ↗</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences: Why is a biodiverse ecosystem healthier than one with only a few species? What happens if you remove one key species?',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. A corn field (monoculture) has only corn plants. A forest has hundreds of species. Which would be harmed more by a disease? Why?',
            '2. What is functional redundancy? Why is it important for ecosystem survival?'
          ],
          id: 'check-questions'
        },
        {
          type: 'Creative: Compare & Draw',
          prompt: 'Draw two ecosystems side-by-side: one with high biodiversity and one with low biodiversity. Label organisms and resources. Then write: Which is more stable if conditions change? Why? What could happen if humans removed a species from each?',
          id: 'check-creative'
        }
      ]
    },
    'Activity: What evidence can scientists use to tell if an ecosystem is healthy?': {
      title: 'Activity: Evidence of Ecosystem Health',
      hook: 'How do scientists know if a stream is healthy? They look for certain indicator organisms. Some can only survive in clean water. Others thrive in pollution. The presence or absence of specific species tells scientists the whole story.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">How do scientists know if a stream is healthy? They look for certain indicator organisms. Some can only survive in clean water. Others thrive in pollution. The presence or absence of specific species tells scientists the whole story.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can identify indicators of ecosystem health and use them to assess local environments.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy Activity — Indicator Species & Ecosystem Health</span>
              <span class="choice-meta">~12 min — how to assess ecosystem condition</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Watch ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">Indicator Organisms: Nature's Report Card</span>
              <span class="choice-meta">~10 min — mayfly nymphs, caddisfly larvae, etc.</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Read ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Do It</span>
              <span class="choice-desc">Assess a Local Ecosystem</span>
              <span class="choice-meta">~20 min — observe organisms and conditions nearby</span>
              <a class="choice-link" href="#">Do below ↓</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 2-3 sentences: What are indicator species? How can scientists use them to know if an ecosystem is healthy without testing every organism?',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. A stream has lots of mayfly nymphs but no fish. What might this tell you about the stream\'s health?',
            '2. Why would a scientist count specific organisms instead of just counting total species?'
          ],
          id: 'check-questions'
        },
        {
          type: 'Creative: Conduct Assessment',
          prompt: 'Spend 15 minutes in a local area (yard, park, stream, pond). List all organisms you see or evidence of them. Assess the ecosystem\'s health: Is it biodiverse? Are indicator species present? Write your assessment and explain your reasoning based on what you observed.',
          id: 'check-creative'
        }
      ]
    },
    'Humans and ecosystems': {
      title: 'Humans and Ecosystems',
      hook: 'We\'re not separate from nature — we\'re part of ecosystems. But human activities (farming, cities, pollution, hunting) reshape ecosystems faster than nature can adapt. We can destroy ecosystems or restore them. The choice is ours.',
      content: `
        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">🎬</span>
            <span class="content-section-title">Hook</span>
          </div>
          <p style="margin-bottom:14px; font-size:0.9rem; color:var(--text-muted);">We're not separate from nature — we're part of ecosystems. But human activities (farming, cities, pollution, hunting) reshape ecosystems faster than nature can adapt. We can destroy ecosystems or restore them. The choice is ours.</p>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">✅</span>
            <span class="content-section-title">I Can…</span>
          </div>
          <h2>I can explain how human activities impact ecosystems and identify conservation solutions.</h2>
        </div>

        <div class="content-section">
          <div class="content-section-header">
            <span class="content-section-icon">📚</span>
            <span class="content-section-title">Learn It — Pick at least one way</span>
          </div>
          <ul class="choice-list">
            <li class="choice-item">
              <span class="choice-type">Watch</span>
              <span class="choice-desc">Khan Academy — Humans and Ecosystems</span>
              <span class="choice-meta">~13 min — habitat loss, pollution, climate, conservation</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Watch ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Read</span>
              <span class="choice-desc">How Humans Changed the Planet: And What We Can Do About It</span>
              <span class="choice-meta">~12 min — deforestation, overfishing, conservation wins</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Read ↗</a>
            </li>
            <li class="choice-item">
              <span class="choice-type">Explore</span>
              <span class="choice-desc">Case Studies: Success Stories in Conservation</span>
              <span class="choice-meta">~10 min — bald eagles, giant pandas, reintroduction</span>
              <a class="choice-link" href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems" target="_blank" rel="noopener">Explore ↗</a>
            </li>
          </ul>
        </div>
      `,
      checks: [
        {
          type: 'Summary',
          prompt: 'Write 3-4 sentences: Give two examples of how human activities harm ecosystems. Then name one conservation effort that has helped restore an ecosystem.',
          id: 'check-summary'
        },
        {
          type: 'Questions',
          questions: [
            '1. Deforestation causes habitat loss. Why would cutting down a forest harm a jaguar population? (Explain the chain of effects.)',
            '2. How can humans both damage and restore ecosystems? Name one action you could take.'
          ],
          id: 'check-questions'
        },
        {
          type: 'Creative: Design a Solution',
          prompt: 'Pick a real ecosystem in trouble (rainforest, coral reef, polar ice, prairie, etc.). Explain: What human activity is harming it? What happens to the food web when this ecosystem is damaged? Propose one conservation strategy that could help. Draw a before/after diagram showing the difference.',
          id: 'check-creative'
        }
      ]
    }
  };

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  async function loadLesson() {
    if (!recordId) {
      document.getElementById('content-main').innerHTML = '<p>No lesson found. <a href="index.html">Go back</a></p>';
      return;
    }

    try {
      const res = await fetch(`${CONFIG.apiBase}/${encodeURIComponent(TABLES.todos)}/${recordId}`);
      if (!res.ok) throw new Error('Record not found');
      const record = await res.json();
      const itemName = record.fields['Item name'] || '';

      let lesson = null;
      for (const [key, data] of Object.entries(lessonData)) {
        if (itemName.includes(key)) {
          lesson = data;
          break;
        }
      }

      if (!lesson) {
        if (itemName.includes('Unit test')) {
          renderKhanTest();
          return;
        }
        document.getElementById('content-main').innerHTML = '<p>Lesson not found.</p>';
        return;
      }

      document.getElementById('lesson-title').textContent = lesson.title;
      document.getElementById('lesson-content').innerHTML = lesson.content;

      const checksHtml = lesson.checks.map((check, idx) => `
        <div class="check-option">
          <div class="check-option-title">Option ${idx + 1}: ${check.type}</div>
          <div class="check-option-desc">
            ${check.questions ? check.questions.map(q => `<p style="margin-bottom:6px;">${q}</p>`).join('') : check.prompt}
          </div>
        </div>
      `).join('');

      document.getElementById('check-options').innerHTML = checksHtml;

      if (recordId) {
        document.getElementById('done-area').innerHTML = `
          <textarea id="notes-content" class="rh-input" placeholder="Share your answer from the check above..." style="min-height:120px; margin-bottom:12px;"></textarea>
          <button class="btn btn-success" onclick="markDone()">✓ Mark This Done</button>
        `;
      }

    } catch (e) {
      console.error(e);
      document.getElementById('content-main').innerHTML = '<p>Error loading lesson.</p>';
    }
  }

  function renderKhanTest() {
    document.getElementById('lesson-content').innerHTML = `
      <div class="content-section">
        <div class="content-section-header">
          <span class="content-section-icon">🎯</span>
          <span class="content-section-title">Khan Academy Unit Test</span>
        </div>
        <p style="margin-bottom:16px; font-size:0.95rem;">You've finished all the lessons for this unit. Now it's time to show what you know on the Khan Academy unit test.</p>
        <p style="margin-bottom:16px; font-size:0.9rem; color:var(--text-dim);">The test has 10 questions. Take your time and do your best. You can take it more than once if you want to improve your score.</p>
        <a href="https://www.khanacademy.org/science/ms-biology/x0c5bb03129646fd6:ecosystems-and-biodiversity/x0c5bb03129646fd6:humans-and-ecosystems/test/x0c5bb03129646fd6:ecosystems-and-biodiversity-unit-test" target="_blank" class="btn btn-success" style="display:inline-block; margin-bottom:20px;">
          Go to Khan Academy Unit Test ↗
        </a>
      </div>
    `;

    document.getElementById('check-section').style.display = 'none';

    document.getElementById('done-area').innerHTML = `
      <textarea id="notes-content" class="rh-input" placeholder="Once you've completed the Khan Academy unit test, let us know how it went (optional notes here)" style="min-height:80px; margin-bottom:12px;"></textarea>
      <button class="btn btn-success" onclick="markDone()">✓ Mark Unit Test Complete</button>
    `;
  }

  window.markDone = async function () {
    const notes = document.getElementById('notes-content')?.value.trim() || '';
    try {
      const res = await fetch(`${CONFIG.apiBase}/${encodeURIComponent(TABLES.todos)}/${recordId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields: { Status: 'Done', 'Completion date': TODAY, 'Student notes': notes } }),
      });
      if (!res.ok) throw new Error('Save failed');
      showToast('Done! Great work. ✓');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (e) {
      console.error(e);
      showToast('Error saving — try from the main list.');
    }
  };

  loadLesson();
</script>
</body>
</html>
