<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's List — HomeSkewl</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Navigation -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand"><span class="dot"></span>HomeSkewl</a>
    <a href="index.html" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Today</span>
    </a>
    <a href="unit.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>My Unit</span>
    </a>
    <a href="this-week.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 2"/></svg>
      <span>This Week</span>
    </a>
    <a href="big-picture.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Big Picture</span>
    </a>
    <a href="parent-guide.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Parents</span>
    </a>
    <a href="learning-review.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>Review</span>
    </a>
  </div>
</nav>

<!-- Page -->
<main class="page">
  <div class="page-header">
    <div class="date-nav">
      <button class="btn btn-ghost" id="prev-day">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Prev
      </button>
      <div class="date-nav-center">
        <div class="date-nav-label" id="nav-title">Today's List</div>
        <div class="date-nav-sub" id="nav-date"></div>
        <div style="display:flex; gap:8px; justify-content:center; margin-top:6px; flex-wrap:wrap;">
          <span class="date-jump-wrap">
            <button class="btn btn-today cal-btn" id="pick-date" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Pick a day
            </button>
            <input type="date" class="date-jump" id="date-jump" aria-label="Jump to date" />
          </span>
          <button class="btn btn-today" id="back-today" style="display:none">Back to Today</button>
        </div>
      </div>
      <button class="btn btn-ghost" id="next-day">
        Next
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <div id="todo-list">
    <div class="loading">
      <div class="spinner"></div>
      Loading your list…
    </div>
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="index.js"></script>
</body>
</html>
