      <span>Today</span>
    </a>
    <a href="rabbit-hole.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

    <a href="big-picture.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>

    <a href="learning-review.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

<!-- Page -->
<main class="page">
  <div class="page-header">
    <div class="date-nav">
      <button class="btn btn-ghost" id="prev-day">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Prev
      </button>
      <div class="date-nav-center">
        <div class="date-nav-label" id="nav-title">Today's List</div>
        <div class="date-nav-sub" id="nav-date"></div>
        <button class="btn btn-today" id="back-today" style="display:none">Back to Today</button>
      </div>
      <button class="btn btn-ghost" id="next-day">
        Next
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <div id="todo-list">
    <div class="loading">
      <div class="spinner"></div>
      Loading your list…
    </div>
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="index.js"></script>

</html>
